# Sadece uygulama pod'larını seçer; 8080'e her kaynaktan izin verir (router dahil).
# Eski "tüm namespace pod'ları + ingress label" kuralı yanlış label'da trafiği tamamen kesiyordu.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: __APP_NAME__-allow-http
spec:
  podSelector:
    matchLabels:
      app: __APP_NAME__
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
